<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>
    <link rel="stylesheet" href="../../css/site.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="top">
      <h1>Memory Game</h1>

      <div class="controls">
        <label class="control">
          <span>Mode</span>
          <select id="mode">
            <option value="classic">Classic</option>
            <option value="moves">Limited Moves</option>
            <option value="time">Beat the Clock</option>
          </select>
        </label>

        <label class="control">
          <span>Board</span>
          <select id="boardSize">
            <option value="4x2">4×2 (Easy)</option>
            <option value="4x4" selected>4×4 (Medium)</option>
            <option value="6x4">6×4 (Hard)</option>
          </select>
        </label>

        <button id="restartBtn" class="btn">Restart</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span>Time</span>
          <strong id="time">00:00</strong>
        </div>
        <div class="stat">
          <span>Moves</span>
          <strong id="moves">0</strong>
        </div>
        <div class="stat">
          <span>Pairs</span>
          <strong id="pairs">0</strong>
        </div>
      </div>
    </header>

    <main>
      <section
        id="gameBoard"
        class="board"
        aria-label="Memory game board"
      ></section>
    </main>
    <!-- Win Modal -->
    <div
      id="winModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="winTitle"
    >
      <div class="modal-card">
        <h2 id="winTitle">You won! ✅</h2>

        <p class="modal-text">
          Time: <strong id="winTime">00:00</strong> · Moves:
          <strong id="winMoves">0</strong>
        </p>

        <p class="modal-text">Best: <strong id="bestScore">—</strong></p>

        <div class="modal-actions">
          <button id="playAgainBtn" class="btn">Play again</button>
          <button id="closeModalBtn" class="btn btn-light">Close</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
